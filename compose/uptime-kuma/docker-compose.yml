version: '3.8'
services:
  uptime-kuma:
    image: louislam/uptime-kuma:${UPTIME_KUMA_TAG:-2}
    container_name: uptime-kuma
    labels:
      - wud.display.name=Uptime Kuma
      - wud.display.icon=si:uptimekuma
      - wud.tag.include=^2$$
      - wud.tag.exclude=slim|rootless|beta
    volumes:
      - uptime-kuma_data:/app/data
    ports:
      - 3002:3001
    restart: unless-stopped

volumes:
  uptime-kuma_data: