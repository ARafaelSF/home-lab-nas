version: '3.3'
services:
  adguardhome:
    image: adguard/adguardhome:${ADGUARD_TAG:-latest}
    container_name: adguardhome
    labels:
      - wud.display.name=AdGuard Home
      - wud.display.icon=si:adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000/tcp"
      - "8080:80/tcp"
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  adguard_work:
  adguard_conf: