# Cadastro de apps — container-ops
# Formato: app|stack_dir|service|tag_env_key|volumes_csv|compose_project
#
# volumes_csv = nomes reais de `docker volume ls` (separados por vírgula)
# compose_project = nome do projeto Docker (`docker compose -p`); vazio = nome da pasta
#
# Imagem no compose deve usar: image: repo/app:${TAG_KEY:-default}

